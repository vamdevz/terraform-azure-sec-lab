name: "Terraform Security Scan & Deployment"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-pipeline:
    name: "Terraform CI/CD"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Step 2: Authenticate to Azure using OIDC
      - name: Az CLI Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step 3: Run Checkov Static Analysis (Soft Fail)
      - name: Run Checkov Action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: true

      # Step 4: Install the Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Step 5: Initialize Terraform using OIDC credentials
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      # Step 6: Generate binary execution plan file
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      # Step 7: Convert binary plan to plain-text JSON for OPA parsing
      - name: Convert Plan to JSON
        run: terraform show -json tfplan > tfplan.json

      # Step 8: Install the Open Policy Agent (OPA) engine
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      # Step 9: Evaluate JSON plan against custom Rego policies
      - name: Evaluate Custom Corporate OPA Policies
        run: |
          opa eval --data enforce-region.rego --input tfplan.json "data.terraform.analysis.allow" --format pretty > opa_result.txt
          cat opa_result.txt
          
          # If OPA evaluation returns false, print errors and stop the build
          if grep -q "false" opa_result.txt; then
            echo "CRITICAL: OPA governance policy validation failed!"
            opa eval --data enforce-region.rego --input tfplan.json "data.terraform.analysis.violations" --format pretty
            exit 1
          fi

      # Step 10: Apply changes ONLY when code pushes or merges directly to main
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
